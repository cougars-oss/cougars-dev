/blue0sim/**:
  ros__parameters:
    gps:
      enable_gps: false

    dynamics:
      mass: [11.5, 11.5, 11.5]
      linear_drag: [11.5, 11.5, 11.5]
      quad_drag: [1.8, 1.8, 1.8]

    prior:
      parameter_priors:
        initial_position_sigmas: [0.001, 0.001, 1.0]

/blue0sim/dvl_a50_odom_node:
  ros__parameters:
    publish_diagnostics: false

/blue0sim/global_costmap:
  global_costmap:
    ros__parameters:
      global_frame: "map"
      robot_base_frame: "blue0sim/base_link"

/blue0sim/local_costmap:
  local_costmap:
    ros__parameters:
      global_frame: "blue0sim/odom"
      robot_base_frame: "blue0sim/base_link"
