/**:
  waypoint_nav2_node:
    ros__parameters:
      waypoint_topic: "waypoints"

  waypoint_follower:
    ros__parameters:
      stop_on_failure: true
      waypoint_task_executor_plugin: "wait_at_waypoint"
      wait_at_waypoint:
        plugin: "nav2_waypoint_follower::WaitAtWaypoint"
        waypoint_pause_duration: 0

  bt_navigator:
    ros__parameters:
      odom_topic: "odometry/local"
      default_bt_xml_filename: "navigate_to_pose_w_replanning_and_recovery.xml"
      transform_tolerance: 2.0

  planner_server:
    ros__parameters:
      expected_planner_frequency: 1.0
      transform_tolerance: 2.0
      planner_plugins: ["GridBased"]
      GridBased:
        plugin: "nav2_navfn_planner/NavfnPlanner"
        tolerance: 0.5

  controller_server:
    ros__parameters:
      controller_frequency: 10.0
      odom_topic: "odometry/local"
      progress_checker_plugin: "progress_checker"
      goal_checker_plugins: ["general_goal_checker"]
      controller_plugins: ["FollowPath"]

      progress_checker:
        plugin: "nav2_controller::SimpleProgressChecker"
        required_movement_radius: 0.5
        movement_time_allowance: 10.0

      general_goal_checker:
        plugin: "nav2_controller::SimpleGoalChecker"
        xy_goal_tolerance: 1.5
        yaw_goal_tolerance: 6.28
        stateful: True

      FollowPath:
        plugin: "nav2_mppi_controller::MPPIController"
        transform_tolerance: 2.0

        time_steps: 50
        model_dt: 0.1
        batch_size: 800
        iteration_count: 1

        motion_model: "Omni"
        vx_max: 1.5
        vx_min: -0.5
        vy_max: 1.0
        wz_max: 0.8

        vx_std: 0.1
        vy_std: 0.1
        wz_std: 0.25

        critics: ["ConstraintCritic", "GoalCritic", "PathFollowCritic", "PathAngleCritic"]

        ConstraintCritic:
          enabled: true
          cost_weight: 1.0

        GoalCritic:
          enabled: true
          cost_weight: 15.0
          threshold_to_consider: 2.0

        PathFollowCritic:
          enabled: true
          cost_weight: 10.0
          offset_from_furthest: 10

        PathAngleCritic:
          enabled: true
          cost_weight: 5.0
          offset_from_furthest: 10

  behavior_server:
    ros__parameters:
      cycle_frequency: 10.0
      transform_tolerance: 2.0
      behavior_plugins: ["spin", "backup", "wait"]
      spin:
        plugin: "nav2_behaviors/Spin"
      backup:
        plugin: "nav2_behaviors/BackUp"
      wait:
        plugin: "nav2_behaviors/Wait"

  global_costmap:
    global_costmap:
      ros__parameters:
        update_frequency: 1.0
        publish_frequency: 1.0
        robot_radius: 0.3
        transform_tolerance: 2.0
        rolling_window: true
        width: 500
        height: 500
        resolution: 0.5
        plugins: ["obstacle_layer"]
        obstacle_layer:
          plugin: "nav2_costmap_2d::ObstacleLayer"
          enabled: True
          observation_sources: ""

  local_costmap:
    local_costmap:
      ros__parameters:
        update_frequency: 5.0
        publish_frequency: 2.0
        robot_radius: 0.3
        transform_tolerance: 2.0
        rolling_window: true
        width: 10
        height: 10
        resolution: 0.1
        plugins: ["obstacle_layer"]
        obstacle_layer:
          plugin: "nav2_costmap_2d::ObstacleLayer"
          enabled: True
          observation_sources: ""
